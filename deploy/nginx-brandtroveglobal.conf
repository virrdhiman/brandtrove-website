# HTTP → HTTPS redirect + ACME challenge
server {
    listen 80;
    listen [::]:80;
    server_name brandtroveglobal.com www.brandtroveglobal.com;

    location /.well-known/acme-challenge/ {
        root /var/www/brandtroveglobal.com;
    }

    location / {
        return 301 https://brandtroveglobal.com$request_uri;
    }
}

# Apex HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name brandtroveglobal.com;

    root /var/www/brandtroveglobal.com;
    index index.html;

    # Certbot-managed paths (adjust if your cert paths differ)
    ssl_certificate /etc/letsencrypt/live/brandtroveglobal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brandtroveglobal.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://formsubmit.co https://api.web3forms.com https://www.google-analytics.com; frame-ancestors 'self';" always;

    # Legacy insights URL → blog
    location = /insights {
        return 301 /blog;
    }
    location = /insights/ {
        return 301 /blog;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    location ~* \.(css|js|svg|ico|webp|jpg|jpeg|png|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(txt|xml)$ {
        default_type text/plain;
        charset utf-8;
        expires 7d;
        add_header Cache-Control "public";
    }

    location = /sitemap.xml {
        default_type application/xml;
    }

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml text/xml;
    gzip_min_length 256;
}

# www → apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.brandtroveglobal.com;

    ssl_certificate /etc/letsencrypt/live/brandtroveglobal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brandtroveglobal.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://brandtroveglobal.com$request_uri;
}
